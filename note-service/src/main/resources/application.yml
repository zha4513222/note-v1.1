server:
  port: 8082

spring:
  application:
    name: note-service
  datasource:
    url: jdbc:mysql://localhost:3306/note_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  web:
    resources:
      static-locations: classpath:/static/,file:./uploads/

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  global-config:
    db-config:
      id-type: auto
    banner: false
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jieba:
  dict-path: classpath:dict/jieba_dict.txt
  stop-words-path: classpath:dict/stopwords.txt

jwt:
  secret: note-service-jwt-secret-key-2024
  expiration: 86400000

# 标签推荐算法权重配置
tag:
  recommend:
    keyword-match-score: 30
    user-history-score: 25
    hot-tag-score: 10
    recency-score: 5
    max-results: 5

# 文件上传配置
file:
  upload:
    path: D:/develop/Claude Project/note v1.1/uploads            # 本地存储路径
    max-size: 5242880          # 单文件最大5MB (bytes)
    allowed-types: jpg,jpeg,png,gif,webp
    max-images-per-note: 10    # 每篇笔记最多10张图

# 置顶配置
note:
  pin:
    durations: 0,7,3,1        # 可选置顶时长（天），0=永久
    default-duration: 0       # 默认永久置顶

logging:
  level:
    com.example.note: debug
